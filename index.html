<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Survey Hub</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(135deg,#0f172a,#2563eb,#06b6d4);
    min-height:100vh;
    color:white;
}


header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(15px);
}


.logo{
    font-size:25px;
    font-weight:bold;
    color:#00ffcc;
}


nav a{
    color:white;
    text-decoration:none;
    margin:10px;
}


#menuBtn{
    display:none;
}


.hero{
    text-align:center;
    padding:70px 20px;
}


.content{
    max-width:700px;
    margin:auto;
    padding:40px;
    border-radius:25px;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(20px);
}


h1{
    font-size:45px;
}


button{
    margin-top:25px;
    padding:15px 35px;
    border:none;
    border-radius:30px;
    background:#00ff88;
    color:#001;
    font-size:18px;
    font-weight:bold;
}


.features{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
}


.card{
    background:rgba(255,255,255,0.18);
    padding:30px;
    border-radius:20px;
    width:280px;
    text-align:center;
}


.card h2{
    color:#00ffcc;
}


footer{
    text-align:center;
    padding:20px;
    margin-top:40px;
}

</style>

</head>

<body>

<header>

<div class="logo">
📊 Survey Hub
</div>

<nav>
<a href="#">Home</a>
<a href="login.html">Login</a>
<a href="register.html">Register</a>
</nav>

</header>


<section class="hero">

<div class="content">

<h1>
Earn Rewards By Sharing Your Opinion 🚀
</h1>

<p>
Complete surveys, collect points and unlock rewards.
</p>

<button id="startBtn">
Get Started
</button>

<div id="authArea"></div>

</div>

</section>


<section class="features">

<div class="card">
<h2>📝 Surveys</h2>
<p>Answer surveys and earn points.</p>
</div>


<div class="card">
<h2>⭐ Rewards</h2>
<p>Redeem your earned rewards.</p>
</div>


<div class="card">
<h2>🔒 Secure</h2>
<p>Your account stays protected.</p>
</div>

</section>


<footer>
© 2026 Survey Hub
</footer>


<script src="js/index.js"></script>

</body>
</html>
