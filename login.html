<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Survey Hub Login</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}


body{

    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#2563eb,#06b6d4);
    color:white;

}


.login-box{

    width:380px;
    padding:40px;
    border-radius:25px;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(20px);
    box-shadow:0 0 30px rgba(0,0,0,0.3);

}


h1{

    text-align:center;
    margin-bottom:25px;
    color:#00ffcc;

}


input{

    width:100%;
    padding:15px;
    margin:12px 0;
    border:none;
    outline:none;
    border-radius:15px;
    background:rgba(255,255,255,0.2);
    color:white;
    font-size:16px;

}


input::placeholder{

    color:#e2e8f0;

}


button{

    width:100%;
    padding:15px;
    margin-top:20px;
    border:none;
    border-radius:30px;
    background:linear-gradient(45deg,#00ff88,#00c6ff);
    font-size:18px;
    font-weight:bold;
    cursor:pointer;

}


button:hover{

    transform:scale(1.05);

}


p{

    text-align:center;
    margin-top:20px;

}


a{

    color:#00ffcc;
    text-decoration:none;
    font-weight:bold;

}


.logo{

    text-align:center;
    font-size:25px;
    margin-bottom:10px;

}

</style>

</head>


<body>


<div class="login-box">


<div class="logo">
📊 Survey Hub
</div>


<h1>
Login 🔐
</h1>


<form id="loginForm">


<input 
type="tel" 
id="phone"
placeholder="Phone Number"
required>


<input 
type="password"
id="password"
placeholder="Password"
required>


<button type="submit">
Login
</button>


</form>


<p>
Don't have an account?
<a href="register.html">
Register
</a>
</p>


</div>



<script src="js/login.js"></script>


</body>
</html>
