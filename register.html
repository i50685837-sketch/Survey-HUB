<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Survey Hub Register</title>


<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}


body{

    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#2563eb,#06b6d4);
    color:white;

}


.register-box{

    width:400px;
    padding:40px;
    border-radius:25px;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(20px);
    box-shadow:0 0 30px rgba(0,0,0,0.3);

}


.logo{

    text-align:center;
    font-size:26px;
    font-weight:bold;
    color:#00ffcc;
    margin-bottom:10px;

}


h1{

    text-align:center;
    margin-bottom:25px;

}


input{

    width:100%;
    padding:15px;
    margin:10px 0;
    border:none;
    outline:none;
    border-radius:15px;
    background:rgba(255,255,255,0.2);
    color:white;
    font-size:16px;

}


input::placeholder{

    color:#e2e8f0;

}


button{

    width:100%;
    padding:15px;
    margin-top:20px;
    border:none;
    border-radius:30px;
    background:linear-gradient(45deg,#00ff88,#00c6ff);
    font-size:18px;
    font-weight:bold;
    cursor:pointer;

}


button:hover{

    transform:scale(1.05);

}


p{

    text-align:center;
    margin-top:20px;

}


a{

    color:#00ffcc;
    text-decoration:none;
    font-weight:bold;

}


</style>

</head>


<body>


<div class="register-box">


<div class="logo">
📊 Survey Hub
</div>


<h1>
Create Account 🚀
</h1>


<form id="registerForm">


<input 
type="text"
id="username"
placeholder="Full Name"
required>


<input 
type="tel"
id="phone"
placeholder="Phone Number"
required>


<input 
type="email"
id="email"
placeholder="Email Address"
required>


<input 
type="password"
id="password"
placeholder="Create Password"
required>


<input 
type="password"
id="confirmPassword"
placeholder="Confirm Password"
required>


<button type="submit">
Register
</button>


</form>


<p>
Already have an account?
<a href="login.html">
Login
</a>
</p>


</div>



<script src="js/register.js"></script>


</body>

</html>
